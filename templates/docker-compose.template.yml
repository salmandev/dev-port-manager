# Example Docker Compose Configuration
# Generated by Dev Port Manager
# Replace <PROJECT_NAME>, <IMAGE_NAME>, etc. with actual values

version: '3.9'

services:
  # Service template - copy and adapt for your project
  service:
    image: <IMAGE_NAME>:latest
    container_name: ${PROJ_NAME:-my-service}
    ports:
      - "${PROJ_PORT:-9100}:8080"  # Host:Container
    environment:
      - PORT=8080
      - SERVICE_NAME=${PROJ_NAME:-my-service}
      - SERVICE_HOST=${PROJ_HOST:-localhost}
      - SERVICE_PORT=${PROJ_PORT:-9100}
      - SERVICE_URL=http://${PROJ_HOST:-localhost}:${PROJ_PORT:-9100}
    env_file:
      - .env
    networks:
      - dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Additional services can be added here
  # db:
  #   image: postgres:14
  #   environment:
  #     POSTGRES_DB: ${DB_NAME:-devdb}
  #   volumes:
  #     - db_data:/var/lib/postgresql/data

networks:
  dev-network:
    driver: bridge

