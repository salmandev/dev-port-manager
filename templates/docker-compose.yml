version: '3.8'

# Docker Compose Template for Dev Port Manager Projects
# Generated by Dev Port Manager CLI
# 
# Usage:
#   1. Run: dev-port docker <project-name> --compose
#   2. This file will be created in your project directory
#   3. Run: docker-compose up -d
#
# Environment variables are loaded from .env file:
#   PORT=<assigned-port>
#   HOST=<assigned-host>
#   URL=<full-url>
#   PROJECT_NAME=<project-name>
#   PROJECT_TYPE=<project-type>

services:
  # Replace 'app' with your service name
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      # Maps host port (from .env) to container port
      - "${PORT:-8080}:8080"
    environment:
      # Application environment variables
      - NODE_ENV=development
      - PORT=8080
      - HOST=${HOST:-localhost}
    volumes:
      # Mount local directory for development
      - .:/app
      # Prevent node_modules from being overwritten
      - /app/node_modules
    working_dir: /app
    restart: unless-stopped
    # Health check (adjust for your app)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Network settings
    networks:
      - dev-network

# Define networks
networks:
  dev-network:
    driver: bridge

# Optional: Define volumes
# volumes:
#   app-data:
