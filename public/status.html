<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="30">
  <title>Dev Port Manager - Live Status</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Status page specific styles */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      padding: 20px;
      min-height: 100vh;
      transition: all 0.3s ease;
    }
    
    .container { max-width: 1400px; margin: 0 auto; }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      margin-bottom: 30px;
    }
    
    h1 { font-size: 28px; display: flex; align-items: center; gap: 10px; }
    .live-indicator {
      width: 10px;
      height: 10px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .stat-card {
      background: var(--card-bg);
      padding: 24px;
      border-radius: 12px;
      text-align: center;
    }
    
    .stat-value { font-size: 32px; font-weight: 700; color: var(--primary); }
    .stat-label { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
    
    .projects-table {
      background: var(--card-bg);
      border-radius: 12px;
      overflow: hidden;
    }
    
    table { width: 100%; border-collapse: collapse; }
    
    th, td {
      padding: 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    
    th {
      background: rgba(0,0,0,0.2);
      font-weight: 600;
      font-size: 13px;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    
    tr:hover { background: rgba(255,255,255,0.02); }
    
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .status-free { background: rgba(34, 197, 94, 0.2); color: var(--success); }
    .status-used { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
    
    .type-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      background: rgba(59, 130, 246, 0.2);
      color: var(--primary);
    }
    
    .url-link {
      color: var(--primary);
      text-decoration: none;
    }
    
    .url-link:hover { text-decoration: underline; }
    
    .last-updated {
      text-align: center;
      padding: 20px;
      color: var(--text-muted);
      font-size: 13px;
    }
    
    .error {
      background: rgba(239, 68, 68, 0.2);
      color: var(--danger);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }
    
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>
        <span class="live-indicator"></span>
        Dev Port Manager - Live Status
      </h1>
      <div style="display: flex; gap: 12px; align-items: center;">
        <!-- Theme Toggle -->
        <div class="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark theme">
          <span class="theme-toggle-icon sun">☀️</span>
          <span class="theme-toggle-icon moon">🌙</span>
          <div class="theme-toggle-slider"></div>
          <span class="theme-toggle-label">Light</span>
        </div>
        <div id="system-info" style="color: var(--text-secondary); font-size: 14px;">-</div>
      </div>
    </header>
    
    <div class="stats" id="stats">
      <div class="stat-card">
        <div class="stat-value">-</div>
        <div class="stat-label">Total Projects</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">-</div>
        <div class="stat-label">Ports Free</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">-</div>
        <div class="stat-label">Ports In Use</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">-</div>
        <div class="stat-label">Project Types</div>
      </div>
    </div>
    
    <div class="projects-table">
      <table>
        <thead>
          <tr>
            <th>Project</th>
            <th>Type</th>
            <th>Host</th>
            <th>Port</th>
            <th>URL</th>
            <th>OS</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="projects-body">
          <tr>
            <td colspan="7" class="loading">Loading...</td>
          </tr>
        </tbody>
      </table>
    </div>
    
    <div class="last-updated" id="last-updated">-</div>
  </div>
  
  <script>
    const API_BASE = window.location.origin;
    
    async function loadStatus() {
      try {
        // Load projects
        const projectsRes = await fetch(`${API_BASE}/api/projects`);
        const projectsData = await projectsRes.json();
        
        // Load port statuses
        const portsRes = await fetch(`${API_BASE}/api/ports/status`);
        const portsData = await portsRes.json();
        
        // Load system info
        const systemRes = await fetch(`${API_BASE}/api/system`);
        const systemData = await systemRes.json();
        
        if (projectsData.success && portsData.success) {
          updateUI(projectsData.projects, portsData.status, systemData.system);
        }
      } catch (err) {
        document.getElementById('projects-body').innerHTML = `
          <tr><td colspan="7" class="error">Error loading data: ${err.message}</td></tr>
        `;
      }
    }
    
    function updateUI(projects, portStatus, system) {
      // Update system info
      document.getElementById('system-info').textContent = 
        `${system.platform} ${system.arch} | Registry: ${system.registryFile}`;
      
      // Update stats
      const portsFree = portStatus.filter(p => p.available).length;
      const portsUsed = portStatus.filter(p => !p.available).length;
      const types = new Set(projects.map(p => p.projectType)).size;
      
      document.querySelector('.stat-card:nth-child(1) .stat-value').textContent = projects.length;
      document.querySelector('.stat-card:nth-child(2) .stat-value').textContent = portsFree;
      document.querySelector('.stat-card:nth-child(3) .stat-value').textContent = portsUsed;
      document.querySelector('.stat-card:nth-child(4) .stat-value').textContent = types;
      
      // Update table
      const tbody = document.getElementById('projects-body');
      if (projects.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="loading">No projects registered</td></tr>';
      } else {
        tbody.innerHTML = projects.map(p => {
          const status = portStatus.find(ps => ps.port === p.port);
          return `
            <tr>
              <td><strong>${p.name}</strong></td>
              <td><span class="type-badge">${p.projectType || 'unknown'}</span></td>
              <td>${p.host}</td>
              <td><span style="color: var(--primary); font-weight: 600;">${p.port}</span></td>
              <td><a href="${p.url}" target="_blank" class="url-link">🔗 ${p.url}</a></td>
              <td><span style="text-transform: capitalize;">${p.os}</span></td>
              <td>
                <span class="status-badge ${status?.available ? 'status-free' : 'status-used'}">
                  ${status?.available ? '✅ Free' : '🔴 In Use'}
                </span>
              </td>
            </tr>
          `;
        }).join('');
      }
      
      // Update timestamp
      const now = new Date();
      document.getElementById('last-updated').textContent =
        `Last updated: ${now.toLocaleString()} (auto-refreshes every 30 seconds)`;
    }

    // Theme toggle function
    function toggleTheme() {
      const html = document.documentElement;
      const currentTheme = html.getAttribute('data-theme');
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      
      html.setAttribute('data-theme', newTheme);
      localStorage.setItem('dpm-theme', newTheme);
      
      // Show visual feedback
      const icon = newTheme === 'light' ? '☀️' : '🌙';
      const toast = document.createElement('div');
      toast.style.cssText = `
        position: fixed;
        bottom: 24px;
        right: 24px;
        padding: 14px 24px;
        background: var(--bg-card);
        color: var(--text-primary);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: var(--shadow-lg);
        z-index: 9999;
        animation: slideIn 0.3s ease;
        font-weight: 600;
      `;
      toast.textContent = `${icon} ${newTheme === 'light' ? 'Light' : 'Dark'} mode`;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.style.animation = 'slideOut 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 2000);
    }

    // Load theme preference
    function loadThemePreference() {
      const html = document.documentElement;
      const savedTheme = localStorage.getItem('dpm-theme') || 'dark';
      html.setAttribute('data-theme', savedTheme);
    }

    // Load theme on page load
    loadThemePreference();
    
    // Initial load
    loadStatus();
  </script>
</body>
</html>
